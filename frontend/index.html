<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobApplied</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="badge">JobApplied</div>
      <h1>Automate job applications with a simple command center.</h1>
      <p>
        Paste one or more job URLs, add optional user data, and trigger the backend agent.
      </p>
    </section>

    <section class="panel">
      <form id="jobForm" class="form">
        <label>
          Job URLs
          <textarea id="urls" name="urls" rows="6" placeholder="https://example.com/job-1\nhttps://example.com/job-2" required></textarea>
        </label>

        <label>
          User Data JSON
          <textarea id="userData" name="userData" rows="10" placeholder='{"fullName":"John Doe","email":"john@example.com","resumeText":"Paste full resume text here..."}'></textarea>
        </label>

        <div class="actions">
          <button type="submit">Start Automation</button>
          <button type="button" id="clearBtn" class="secondary">Clear</button>
        </div>
      </form>

      <div class="statusCard">
        <h2>Run Status</h2>
        <pre id="status">Idle.</pre>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
